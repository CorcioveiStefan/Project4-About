<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Parallax</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      overflow-x: hidden;
    }

    .parallax-section {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .parallax-layer {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      will-change: transform;
    }
  </style>
</head>

<body>

  <div class="parallax-section section-1">
    <div class="parallax-layer layer-1" style="background-image: url('/Project2/Assets/UsedParallaxNightSky.png');">
    </div>
    <div class="parallax-layer layer-2" style="background-image: url('/Project2/Assets/UsedParallaxBuildings.png');">
    </div>
    <div class="parallax-layer layer-3" style="background-image: url('bg3.png');"></div>
  </div>

  <div class="parallax-section section-2">
    <div class="parallax-layer layer-1" style="background-image: url('bg4.png');"></div>
    <div class="parallax-layer layer-2" style="background-image: url('bg5.png');"></div>
    <div class="parallax-layer layer-3" style="background-image: url('bg6.png');"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    gsap.utils.toArray(".parallax-section").forEach(section => {
      let layers = section.querySelectorAll(".parallax-layer");

      gsap.to(layers[0], { y: "-30%", scrollTrigger: { trigger: section, start: "top bottom", end: "bottom top", scrub: 4 } });
      gsap.to(layers[1], { y: "-25%", scrollTrigger: { trigger: section, start: "top bottom", end: "bottom top", scrub: 3 } });
      gsap.to(layers[2], { y: "-40%", scrollTrigger: { trigger: section, start: "top bottom", end: "bottom top", scrub: 4 } });
    });
  </script>

</body>

</html>
