<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Effect</title>
  <link rel="stylesheet" href="test.css">
</head>

<body>

  <section class="parallax-section section-1">
    <div class="content">
      <h1>Section 1</h1>
      <p>Some content goes here...</p>
    </div>
    <div class="sec-1-bg-1 bg-fixed"></div>
    <div class="sec-1-bg-2 bg-fixed"></div>
    <div class="sec-1-bg-3 bg-fixed"></div>
    <div class="sec-1-bg-4 bg-fixed"></div>
  </section>

  <section class="parallax-section section-2">
    <div class="content">
      <h1>Section 2</h1>
      <p>More content...</p>
    </div>
    <div class="sec-2-bg-1 bg-fixed"></div>
    <div class="sec-2-bg-2 bg-fixed"></div>
    <div class="sec-2-bg-3 bg-fixed"></div>
    <div class="sec-2-bg-4 bg-fixed"></div>
  </section>

  <section class="parallax-section section-3">
    <div class="content">
      <h1>Section 3</h1>
      <p>Even more content...</p>
    </div>
    <div class="sec-3-bg-1 bg-fixed"></div>
    <div class="sec-3-bg-2 bg-fixed"></div>
    <div class="sec-3-bg-3 bg-fixed"></div>
    <div class="sec-3-bg-4 bg-fixed"></div>
  </section>

  <section class="parallax-section section-4">
    <div class="content">
      <h1>Section 4</h1>
      <p>Even more content...</p>
    </div>
    <div class="sec-4-bg-1"></div>
    <div class="sec-4-bg-2"></div>
    <div class="sec-4-bg-3"></div>
    <div class="sec-4-bg-4"></div>
  </section>

  <script src="test.js"></script>
</body>

</html>
